name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: Authenticate to GitHub Packages
        run: >
          echo "${{ secrets.GIT_PACKAGES_TOKEN }}" | dotnet nuget add source
          --username ${{ github.actor }}
          --password-stdin
          --store-password-in-clear-text
          --name github
          "https://nuget.pkg.github.com/monambike/index.json"

      - name: Publish
        run: dotnet publish src/Monambike.Web/Monambike.Web.csproj -c Release -o release

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
