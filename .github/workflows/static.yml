name: Deploy Blazor WASM to GitHub Pages 

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create temp nuget.config
        run: |
          echo '<?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
                <add key="monambike" value="https://nuget.pkg.github.com/monambike/index.json" />
                <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
            <packageSourceCredentials>
              <monambike>
                <add key="Username" value="${{ github.actor }}" />
                <add key="ClearTextPassword" value="${{ secrets.GIT_PACKAGES_TOKEN }}" />
              </monambike>
            </packageSourceCredentials>
          </configuration>' > nuget.temp.config
  
      - name: Authenticate to GitHub Packages
        run: |
          dotnet nuget add source \
            --name github "https://nuget.pkg.github.com/monambike/index.json" \
            --username ${{ github.actor }} \
            --password "${{ secrets.GIT_PACKAGES_TOKEN }}" \
            --store-password-in-clear-text

      - name: Publish
        run: dotnet publish src/Monambike.Web/Monambike.Web.csproj -c Release -o release --configfile nuget.temp.config

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: release/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
